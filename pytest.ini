[pytest]
testpaths = tests
python_files = test_*.py
# Put the repo root on sys.path so `import colab`, `import confidence`, etc. work
# regardless of how pytest is invoked (bare `pytest`, `python -m pytest`, CI, HPC).
pythonpath = .
addopts = -ra --tb=short
markers =
    gpu: requires CUDA GPU (skipped in CPU-only CI)
