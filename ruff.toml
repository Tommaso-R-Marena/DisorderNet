# Ruff configuration for DisorderNet CI.
# The CPU/GPU research scripts predate a linter, so CI enforces only the
# high-signal "must fix" rules (syntax errors + undefined names) across all
# Python files. Style rules are intentionally not enforced to avoid churn.
line-length = 120
extend-exclude = ["*.ipynb", ".venv"]

[lint]
select = ["E9", "F63", "F7", "F82"]
